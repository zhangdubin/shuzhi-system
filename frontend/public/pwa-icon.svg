<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F6BFF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- 圆角矩形背景（模仿 iOS app icon） -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- 高光（顶部） -->
  <rect width="512" height="256" rx="96" ry="96" fill="url(#shine)"/>
  <!-- "数" 字（白） -->
  <text x="256" y="320" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif"
        font-size="260" font-weight="700" fill="#fff" text-anchor="middle" dominant-baseline="central">数</text>
</svg>
