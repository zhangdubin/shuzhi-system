# ============================================================
# Prometheus 告警规则
# ============================================================
# 用法：
#   把这个文件挂到 prometheus 容器里：
#   volumes:
#     - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml
#   然后在 prometheus.yml 里加：
#   rule_files:
#     - /etc/prometheus/alerts.yml

groups:
  # ============== 后端 API ==============
  - name: backend_api
    interval: 30s
    rules:
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "后端服务不可用"
          description: "Backend instance {{ $labels.instance }} 已宕机超过 1 分钟"

      - alert: HighErrorRate
        expr: |
          sum(rate(shuzhi_http_requests_total{job="backend",status=~"5.."}[5m]))
          /
          sum(rate(shuzhi_http_requests_total{job="backend"}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "5xx 错误率超过 5%"
          description: "5 分钟内 5xx 比例 {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(shuzhi_http_request_duration_seconds_bucket{job="backend"}[5m]))
          by (le, path)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 延迟超 1s"
          description: "端点 {{ $labels.path }} P99 = {{ $value }}s"

      - alert: SlowRequests
        expr: rate(shuzhi_http_slow_requests_total{job="backend"}[5m]) > 5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "慢请求频繁"
          description: "5 分钟内 >500ms 请求数 {{ $value }}"

  # ============== 数据库 ==============
  - name: database
    interval: 30s
    rules:
      - alert: PostgresDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL 不可用"
          description: "Postgres exporter 已断开 1 分钟"

      - alert: HighDBConnections
        expr: pg_stat_activity_count > 180
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库连接数过高"
          description: "当前连接数 {{ $value }}，最大 200"

      - alert: DBLockWait
        expr: pg_locks_count{mode="exclusive"} > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "数据库锁等待严重"
          description: "独占锁数量 {{ $value }}"

      - alert: SlowQueries
        expr: rate(pg_stat_user_tables_seq_scan[5m]) > 100
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "可能存在全表扫描"
          description: "表 {{ $labels.relname }} seq_scan 频率高，建议加索引"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/var/lib/postgresql"} / node_filesystem_size_bytes{mountpoint="/var/lib/postgresql"}) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PG 数据盘可用空间不足 10%"
          description: "可用 {{ $value | humanizePercentage }}"

  # ============== Redis ==============
  - name: redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis 不可用"
          description: "Redis exporter 已断开 1 分钟"

      - alert: HighRedisMemory
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 内存使用率超 80%"
          description: "使用率 {{ $value | humanizePercentage }}"

      - alert: RedisEvictions
        expr: increase(redis_evicted_keys_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis 正在淘汰键"
          description: "5 分钟内淘汰 {{ $value }} 个键，建议扩容或优化 TTL"

  # ============== 主机 ==============
  - name: host
    interval: 30s
    rules:
      - alert: HighCPU
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率持续超 80%"
          description: "实例 {{ $labels.instance }} CPU {{ $value | humanize }}%"

      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率超 85%"
          description: "实例 {{ $labels.instance }} 内存 {{ $value | humanize }}%"

      - alert: HostDiskFull
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes) < 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "磁盘可用空间不足 5%"
          description: "挂载点 {{ $labels.mountpoint }} 仅剩 {{ $value | humanizePercentage }}"

  # ============== OCR 服务 ==============
  - name: ocr_service
    interval: 30s
    rules:
      - alert: OCRServiceDown
        expr: up{job="ocr-service"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "OCR 服务不可用"
          description: "影响发票识别功能，但系统仍可手动录入"

      - alert: OCRHighLatency
        expr: histogram_quantile(0.95, sum(rate(ocr_request_duration_seconds_bucket[5m])) by (le)) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OCR P95 延迟超 10s"
          description: "建议扩容或切换到 GPU 镜像"

  # ============== 业务指标（R7.2）==============
  - name: business
    interval: 30s
    rules:
      - alert: OCRFailureRateHigh
        expr: |
          sum(rate(shuzhi_business_ocr_total{status="failed"}[5m]))
          /
          sum(rate(shuzhi_business_ocr_total[5m]))
          > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "OCR 失败率超过 10%"
          description: "5 分钟内 OCR 失败率 {{ $value | humanizePercentage }}"

      - alert: LoginFailureBurst
        expr: |
          sum(rate(shuzhi_business_login_total{result="failed"}[1m])) > 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "登录失败激增（可能密码爆破）"
          description: "1 分钟内 {{ $value }} 次失败登录，请检查"

      - alert: AICacheMissHigh
        expr: |
          sum(rate(shuzhi_business_ai_total{cache="miss"}[5m]))
          /
          sum(rate(shuzhi_business_ai_total[5m]))
          > 0.5
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "AI 缓存命中率低"
          description: "5 分钟内 miss 率 {{ $value | humanizePercentage }}，可能问题多样化"
