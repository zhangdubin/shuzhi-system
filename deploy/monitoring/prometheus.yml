# ============================================================
# Prometheus 监控配置
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则（R7.2 增强）
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['shuzhi-backend:8000']


  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['shuzhi-postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['shuzhi-redis-exporter:9121']

  - job_name: 'cadvisor'
    metrics_path: /metrics
    static_configs:
      - targets: ['shuzhi-cadvisor:8080']

