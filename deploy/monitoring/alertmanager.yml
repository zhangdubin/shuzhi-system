# ============================================================
# AlertManager 配置（R7.2）
# - 接收 prometheus 告警
# - 去重 + 分组
# - 路由到 webhook（飞书/钉钉/企业微信）
# ============================================================
global:
  resolve_timeout: 5m

# 路由
route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

# 接收器
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://shuzhi-backend:8000/api/v1/admin/alert/webhook'
        send_resolved: true

# 抑制规则（critical 告警时不再发 warning）
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
