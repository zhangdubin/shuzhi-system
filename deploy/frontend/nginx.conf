# nginx 配置（含 SSE 支持 + SPA 路由 + 缓存策略）

# 上游（后端）
upstream backend_api {
    server shuzhi-backend:8000;
    keepalive 32;
}

# 主服务
server {
    listen 80;
    server_name _;

    # 客户端最大请求体（文件上传 50MB）
    client_max_body_size 50M;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml application/octet-stream;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # 根路径 - 前端静态文件
    root /usr/share/nginx/html;
    index index.html;

    # HTML 不缓存（避免发布后看到旧版）
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    # 静态资源长缓存
    location ~* \.(css|js|jpg|jpeg|png|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 错误页
    error_page 404 /error-404.html;
    error_page 500 502 503 504 /error-500.html;
    location = /error-404.html { internal; }
    location = /error-500.html { internal; }

    # 健康检查端点
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # 静态文件（用户上传的发票图/PDF）→ 反代到后端 /static
    # 否则前端 img 标签的 http://localhost/static/uploads/xxx.jpg 会被 404
    location /static/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # 静态资源 30 天缓存
        expires 30d;
        add_header Cache-Control "public";
    }

    # API 代理（重要：SSE 配置）
    # 报销中心是独立容器 shuzhi-reimbursement:8002，需要单独反代
    location /api/v1/reimbursements {
        proxy_pass http://shuzhi-reimbursement:8002/api/v1/reimbursements;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    # 后端真实前缀 /api/v1/*，location 不带尾 slash，proxy_pass 带尾 slash → 原样追加
    location /api {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # 超时
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # SSE 端点（关键配置）
    location /sse/ {
        proxy_pass http://backend_api/sse/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ★ SSE 关键配置 ★
        proxy_buffering off;                # 禁用缓冲
        proxy_cache off;                     # 禁用缓存
        proxy_read_timeout 86400s;          # 长连接 24h
        proxy_send_timeout 86400s;
        add_header X-Accel-Buffering no;    # 关键
        add_header Cache-Control "no-cache";
    }

    # 默认 fallback - SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }
}
