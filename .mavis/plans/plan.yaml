      4. **费用明细**：表格（日期 / 子项 / 金额 / 备注）
      5. **审批流**：横向 3-4 节点（提交 → 部门经理 → 财务 → 出纳）
      6. **附件**：上传列表（占位）
      7. 顶部：返回 / 审批通过 / 驳回

      ## 创建页必含
      1. **步骤条**：基础信息 → 费用明细 → 提交（3 步）
      2. **基础信息**：类别（radio：差旅/招待/办公/其他）、关联项目、申请人自动填、申请日期、用途摘要
      3. **费用明细**：动态行（费用日期 / 子类别 / 金额 / 备注 / 删除）
      4. **总金额实时计算**（合计 + 大写转换可省，用 toLocaleString）
