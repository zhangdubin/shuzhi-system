      - `frontend/src/assets/styles/detail.scss`（已就绪的样式系统）
      - `design/sales-expense.html`（如存在）+ 推断费用页结构

      ## 详情页必含
      1. **Hero**：费用单号 / 类别（差旅/招待/办公）/ 金额（红字突出）/ 申请人 / 申请时间 / 状态
      2. **Tabs**：基本信息 / 费用明细 / 审批流 / 附件
