  # ============================================================
  # 6. 集成验证（最终冒烟：build + 容器内起 + 路由全跳）
  # ============================================================
  - id: integration-build-and-smoke
    title: '集成验证：5 模块全 build + 容器内端到端冒烟'
    prompt: |
      ## 目标
      验证 5 个详情/编辑器全部接通，跑 build + 容器 reload + 路由冒烟。

      ## 步骤
      1. **重新 build**：
         ```bash
         cd /Users/trisome/Desktop/开发/数智化系统new/frontend
         rm -rf dist
         npm run build 2>&1 | tail -20
         ```
         0 错误 0 警告（chunk 大小警告忽略）。

      2. **容器 reload frontend**（dist 通过 bind mount 已经在容器内）：
         ```bash
         docker exec shuzhi-frontend nginx -s reload 2>&1 | head -3
         # 或强重启：
         docker restart shuzhi-frontend
         sleep 3
         ```

      3. **端到端冒烟**（每条都要有输出）：
         ```bash
         # 入口
         curl -s -m 5 -o /dev/null -w "GET / = %{http_code}\n" http://localhost
         # 登录
         TOKEN=$(curl -s -X POST http://localhost/api/v1/auth/login \
           -H "Content-Type: application/json" \
           -d '{"account":"admin","password":"admin123"}' \
           | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
         echo "TOKEN len: ${#TOKEN}"
         # 项目/合同/费用/回款 详情端点
         for ep in project contract expense receivable; do
           curl -s -m 5 -o /dev/null -w "GET /api/v1/$ep/1 = %{http_code}\n" \
             -H "Authorization: Bearer $TOKEN" http://localhost/api/v1/$ep/1
         done
         ```

      4. **路由 SPA fallback 测试**：
         ```bash
         # 直接 GET 详情路由，应返 index.html（SPA fallback）
         for path in /project/1 /contract/1 /expense/1 /receivable/1 /invoice/ocr/1 /invoice/template/1; do
           curl -s -m 5 -o /dev/null -w "GET $path = %{http_code}\n" http://localhost$path
         done
         # 全部应返 200（SPA fallback 返 index.html）
         ```

      5. **写 `deliverable.md`**：列出所有 build/冒烟结果，标注通过/失败。

      ## 失败处理
      如有 TS 错误 / 路由 404 / 容器错：
      - 标 FAIL，**指出哪个 task 出问题**
      - 给出具体文件:行号
      - **不自己改代码**——返回 CycleReport 给 owner 决定
    assigned_to: verifier
    verified_by: verifier
    verify_prompt: |
      复核集成验证的 deliverable.md：
      1. build 输出 0 错误（警告可接受）
      2. 5 个详情路由 fallback 全 200
      3. 5 个 API 详情端点**至少 3 个返 200/404**（404 是后端没 seed 也算通过，证明路由可达）
      4. 容器 shuzhi-frontend 状态 healthy
      FAIL 精确指出哪个步骤没过。
