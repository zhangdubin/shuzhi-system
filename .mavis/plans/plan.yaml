      ```
      0 错误。

      ## 交付
      - 两个 .vue + 路由补全
      - `deliverable.md` 列文件清单 + build 结果
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      验证：
      1. 读 `frontend/src/views/expense/ExpenseDetail.vue` vs `ContractDetail.vue` ——结构对齐
      2. 跑 `cd frontend && npm run build` ——0 错误
      3. 路由 `/expense/:id` 和 `/expense/create` 存在
      4. 详情页用 `.detail-hero` / `.detail-tabs` / `.detail-section` / `.info-grid` / `.flow-horizontal`
      5. 创建页用 `.step-bar` / `.form-section` / `.form-row-2` / `.form-foot` / `.tip-box`
      6. 费用明细动态行用 `v-for` 渲染 + `el-button` 删除
      FAIL 精确指出缺什么。

