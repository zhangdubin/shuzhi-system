version: 1
plan:
  name: '详情/编辑器 5 模块并行复刻 design 设计稿'
  max_concurrency: 5
  max_consecutive_failures: 2
  max_cycles: 3
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0

tasks:
  # ============================================================
  # 1. 项目详情 + 创建（design/project.html / project-detail.html）
  # ============================================================
  - id: project-detail-and-create
    title: '项目详情 + 项目创建/编辑（1:1 复刻 design）'
    prompt: |
      ## 目标
      1:1 复刻 `design/` 下项目相关设计稿到 Vue3 + Element Plus，实现两个页面：
      - **项目详情页**：`src/views/project/ProjectDetail.vue`（路由 `/project/:id`）
      - **项目创建/编辑页**：`src/views/project/ProjectCreate.vue`（路由 `/project/create` 或 `/project/:id/edit`）

      ## 必读标杆（先读懂再写）
      - `frontend/src/views/contract/ContractDetail.vue`：我已写好的标杆，1:1 复刻 design/contract-detail.html。**直接照搬结构、class 名、SCSS**，把数据换成项目。
      - `design/project.html`：项目列表设计稿（仅作上下文，不需实现）
      - `design/project-detail.html`：项目详情设计稿（**主要参考**——如不存在就看 design/contract-detail.html 推断，因为项目详情结构类似）

      ## 详情页必含（与 ContractDetail 对齐）
      1. **Hero 渐变 banner**：项目编号、项目名称、客户名称、起止日期、项目预算金额、状态 tag
      2. **Tabs**：基本信息 / 里程碑 / 团队成员 / 合同 / 费用 / 回款 / 发票
      3. **基本信息**（detail-section + info-grid）：项目编号 / 名称 / 客户 / 负责人 / 状态 / 类型 / 预算 / 实际成本 / 毛利率 / 起始日期 / 截止日期 / 进度 / 项目描述
      4. **里程碑**：横向 4-5 节点流程（启动 / 需求 / 开发 / 验收 / 交付），用 `flow-horizontal` 样式
      5. **团队成员**：表格（成员 / 角色 / 工时 / 加入时间）
      6. **合同/费用/回款/发票**：每个 tab 内嵌表格（占位数据即可）
      7. 顶部操作：返回列表 / 编辑项目 / 归档项目

      ## 创建页必含
      1. **顶部操作条**：返回 / 保存草稿 / 提交
      2. **步骤条**（step-bar）：基础信息（current）→ 团队配置 → 里程碑 → 提交审核（4 步）
      3. **基础信息分组**（form-section）：项目名称、编号、客户（下拉）、负责人（下拉）、类型、预算（el-input-number）、起止日期（el-date-picker daterange）、项目描述（el-input textarea）
      4. **团队配置分组**：动态行（成员下拉 + 角色 + 占比 + 删除按钮）
      5. **里程碑分组**：动态行（名称 + 计划日期 + 交付物 + 状态 + 删除按钮）
      6. **底部 form-foot**：上一步 / 暂存 / 提交审核
      7. **tip-box 提示**：金额 ≥ 50 万自动触发"总经理审批"步骤

      ## API（已就绪，直接用）
      - `import { projectApi, type Project } from '@/api/modules'`
      - `projectApi.detail(id)` / `projectApi.create(data)` / `projectApi.update(id, data)`
      - 调真接口，404 时 `.catch(() => null)` 占位

      ## 设计系统
      - 所有样式走 `frontend/src/assets/styles/detail.scss`（已就绪）
      - class 名严格对齐 design：`.detail-hero` / `.detail-tabs` / `.detail-section` / `.info-grid` / `.flow-horizontal` / `.step-bar` / `.form-section` / `.form-row-2` / `.form-foot` / `.tip-box` / `.term-block`
      - 不写 inline style 除非必要，**优先用 detail.scss 的 token**

      ## 路由
      在 `frontend/src/router/index.ts` 已有 `ProjectDetail`（/project/:id）——补一条 `/project/create` + `/project/:id/edit` → ProjectCreate.vue

      ## 自检（必跑）
      ```bash
      cd frontend
      npm run build 2>&1 | tail -10
      # 0 TS 错误
      ```
      不通过不准交。

      ## 交付
      - 两个 .vue 文件写完 + 路由加完
      - 写一份 `deliverable.md` 到工作区，列出：修改了哪些文件 / build 结果 / 关键设计决策
      - 不要碰其他模块
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      独立验证项目详情 + 创建页：
      1. 读 `frontend/src/views/contract/ContractDetail.vue` 标杆 vs `frontend/src/views/project/ProjectDetail.vue` ——结构必须对齐
      2. 跑 `cd frontend && npm run build` ——0 错误
      3. 路由 `/project/:id` 和 `/project/create` 必须存在
      4. 检查 class 名与 `detail.scss` 定义一致（用 grep）
      5. 抽查 detail-page 是否用了 `.detail-hero` / `.detail-tabs` / `.detail-section` / `.info-grid`
      6. 抽查 create-page 是否用了 `.step-bar` / `.form-section` / `.form-row-2` / `.form-foot` / `.tip-box`
      7. 必须**真调** `projectApi.detail` / `create` / `update`（在 script setup 里出现 import 调用，不是 hardcode）
      FAIL 给出**精确的缺什么**。

