version: 1
plan:
  name: 'AI 面板 + 客户 + admin 4 子页 严格对齐 design 设计稿'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 3
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0

tasks:
  # ============================================================
  # 1. AI 面板：项目/合同 + 抽屉（3 个文件）
  # ============================================================
  - id: ai-panels-and-drawer
    title: 'AI 面板 + 抽屉（1:1 复刻 design/ai-panel-*）'
    prompt: |
      ## 目标
      1:1 复刻 AI 智能助手相关设计稿到 Vue3 + Element Plus：
      1. `src/views/ai/AiPanelProject.vue`（路由 /ai/panel/project）——design/ai-panel-project.html
      2. `src/views/ai/AiPanelContract.vue`（路由 /ai/panel/contract）——design/ai-panel-contract.html
      3. `src/components/AiDrawer.vue`（通用 AI 抽屉组件）——design/ai-panel-contract-drawer.html

      ## 必读标杆
      - `frontend/src/views/contract/ContractDetail.vue`：1:1 复刻标杆
      - `frontend/src/views/ai/AiExtract.vue`：现有 AI 页面风格
      - `frontend/src/views/project/ProjectDetail.vue`、`/contract/ContractList.vue`：要嵌入触发器
      - `frontend/src/assets/styles/detail.scss`：已就绪样式
      - `design/ai-panel-project.html`、`design/ai-panel-contract.html`、`design/ai-panel-contract-drawer.html`：必读
      - **现场对照**（在浏览器或本地起 `http://localhost:8081/design/ai-panel-*.html` 看）
      - `design/DESIGN-TOKENS.md`：颜色/间距/字体规范

      ## 关键要求（与 design 1:1）
      1. **深色 hero 渐变 banner**（`#0F172A → #1E1B4B → #312E81`），用 `--gradient-hero` token
      2. **AI 状态指示器**：脉冲点 + "AI 实时分析中" 文案
      3. **3-4 列 KPI 卡**：智能识别率 / 风险预警数 / 处理时长 / 待办任务
      4. **分析流时间线**（左侧竖线 + 多步骤，每步有 AI 信心度条）
      5. **风险预警列表**（带严重程度色：danger/warning/info）
      6. **智能建议卡**（含"采纳"/"忽略"/"详情"操作）
      7. **Drawer 组件**（AiDrawer.vue）：
         - el-drawer 包裹，title="AI 智能分析"
         - 内部含 Tab 切换（洞察 / 建议 / 历史）
         - 底部固定操作条（采纳全部 / 忽略 / 关闭）
         - 通过 props 接收 trigger data (项目/合同数据)
      8. **触发器**：
         - AiPanelProject.vue：项目列表 + 详情页加 "🤖 AI 智能分析" 按钮，点击打开 AiDrawer
         - AiPanelContract.vue：合同列表 + 详情页加 "🤖 AI 智能分析" 按钮，点击打开 AiDrawer

      ## 路由
      在 `frontend/src/router/index.ts` 加 2 条路由：
      - `/ai/panel/project` → AiPanelProject.vue
      - `/ai/panel/contract` → AiPanelContract.vue

      ## API
      - `import { aiApi } from '@/api/ai'`
      - `aiApi.tasks / alerts / taskDetail` 都已就绪
      - 调用真实接口 + `.catch(() => null)` 占位

      ## 自检
      ```bash
      cd /Users/trisome/Desktop/开发/数智化系统new/frontend && npm run build 2>&1 | tail -10
      ```
      0 错误。

      ## 交付
      - 3 个 .vue 写完
      - 路由 + 触发器加完
      - deliverable.md 列文件清单 + build 结果
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      1. 读 `frontend/src/components/AiDrawer.vue` vs design/ai-panel-contract-drawer.html ——结构 1:1
      2. 读 AiPanelProject.vue vs ai-panel-project.html ——结构 1:1
      3. 读 AiPanelContract.vue vs ai-panel-contract.html ——结构 1:1
      4. `cd frontend && npm run build` ——0 错误
      5. 路由 `/ai/panel/project` 和 `/ai/panel/contract` 存在
      6. AiDrawer 用 el-drawer + el-tabs + el-button
      7. 必须真调 `aiApi.tasks / alerts / taskDetail`
      8. 深色 hero 用 `--gradient-hero` token
      FAIL 精确指出。

  # ============================================================
  # 2. 客户管理（list + create）
  # ============================================================
  - id: client-list-and-create
    title: '客户管理（列表 + 创建，1:1 复刻 design）'
    prompt: |
      ## 目标
      1:1 复刻 `design/client-create.html` + 推断的列表页：
      1. `src/views/client/ClientList.vue`（路由 /client/list）——客户列表
      2. `src/views/client/ClientCreate.vue`（路由 /client/create）——新建客户档案

      ## 必读标杆
      - `frontend/src/views/contract/ContractList.vue`：列表页 1:1 标杆
      - `frontend/src/views/contract/ContractCreate.vue`：创建页 1:1 标杆
      - `design/client-create.html`：客户创建设计稿
      - `frontend/src/assets/styles/detail.scss`：已就绪样式

      ## 列表页必含
      1. 顶部：返回 / 搜索（客户名/纳税人识别号/联系人） / 新建按钮
      2. 统计卡 4 个：客户总数 / 活跃客户 / 本月新增 / 待跟进
      3. 表格列：客户编号 / 客户名称 / 联系人 / 电话 / 客户等级（VIP/A/B/C）/ 行业 / 关联合同数 / 累计交易额 / 状态（合作中/暂停/已流失）
      4. 行点击进详情（如有详情路由）+ 操作列（编辑/跟进/转合同）
      5. 分页器

      ## 创建页必含（按 design/client-create.html）
      1. 顶部：返回 / 保存 / 暂存
      2. **基本信息**（form-section）：客户名称、纳税人识别号、客户类型（企业/个人）、所属行业、注册资本、成立日期、客户来源（下拉）
      3. **联系信息**（form-section）：联系人、职位、电话、邮箱、传真、地址（省市区+详细）
      4. **银行信息**（form-section）：开户行、银行账号、账户名
      5. **等级选择**：level-grid 4 卡（VIP / A / B / C），互斥
      6. **附件上传**：att-area 占位
      7. **底部 form-foot**：取消 / 暂存 / 保存新建

      ## API
      - 新建 `src/api/client.ts`：`clientApi.list / detail / create / update / delete`
      - 调真接口 `.catch(() => null)` 占位

      ## 路由 + 侧栏
      - 在 `frontend/src/router/index.ts` 加 2 条路由
      - **侧栏**（`frontend/src/config/menu.ts`）加"客户管理"组：/client/list 单一菜单（业务下）

      ## 自检
      ```bash
      cd frontend && npm run build 2>&1 | tail -10
      ```
      0 错误。

      ## 交付
      - 2 个 .vue + clientApi + 路由 + 侧栏加项
      - deliverable.md
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      1. ClientList vs ContractList 结构对齐
      2. ClientCreate vs design/client-create.html 1:1
      3. `npm run build` 0 错误
      4. 路由 `/client/list` `/client/create` 存在
      5. 等级选择 4 卡互斥（level-grid + 单选状态）
      6. 表格 el-table + 分页器
      7. 必含 form-section / form-row-2 / form-row-3
      FAIL 精确指出。

  # ============================================================
  # 3. admin 4 子页（用户/角色/部门/字典）
  # ============================================================
  - id: admin-4-subpages
    title: 'admin 4 子页 1:1 复刻 design（用户/角色/部门/字典）'
    prompt: |
      ## 目标
      复刻 admin 4 子页（**前端层 mock 演示**，后端可后续接）：

      ## 必读标杆
      - `frontend/src/views/contract/ContractList.vue`：列表标杆
      - `frontend/src/views/admin/AdminUser.vue`：现有用户页（含可补全的表格）
      - `design/` 下 admin 相关：看 `design/components-states.html` 找组件态、参考 dashboard.html 的 stat-card
      - **现场对照** http://localhost:8081/design/

      ## 1. 用户管理（重构现有 AdminUser.vue）
      - 顶部：搜索 + 新建用户 + 批量导入
      - 统计卡 4 个：用户总数 / 在线 / 今日活跃 / 待审核
      - 表格列：账号 / 姓名 / 角色（多 tag）/ 部门 / 邮箱 / 手机 / 状态（启用/禁用）/ 最后登录 / 操作
      - 行操作：编辑 / 重置密码 / 禁用 / 分配角色
      - 顶部按钮：批量启用/禁用

      ## 2. 角色权限（AdminRole.vue 重写）
      - 左侧：角色列表（超级管理员 / 管理员 / 财务 / 销售 / 业务员 / 访客）
      - 右侧：选中角色的权限树（按模块分组：仪表盘/项目/合同/费用/回款/发票/AI/系统管理）
      - 树节点：增删改查 + 审批 / 导入 / 导出 / 配置
      - 顶部"新建角色"按钮
      - 底部"保存权限"sticky bar

      ## 3. 部门管理（AdminDept.vue 重写）
      - 左侧：组织架构树（el-tree，5 部门初始）
      - 右侧：选中部门详情 + 成员列表（表格）
      - 顶部：新增部门 / 编辑 / 删除 / 调整
      - 支持拖拽（el-tree draggable）

      ## 4. 数据字典（AdminDict.vue 重写）
      - 左侧：字典分类（行业 / 客户等级 / 费用类型 / 合同状态 / 项目状态 / 发票类型）
      - 右侧：选中分类的字典项表格（编码 / 名称 / 排序 / 启用 / 操作）
      - 顶部：新建字典项 / 批量启用 / 同步到下拉
      - 可新增字典分类

      ## API（mock 即可，前端 .catch 占位）
      - 调真实后端 `.catch(() => null)`，表格用本地 mock 数据回填
      - 不要加新文件到 backend/

      ## 自检
      ```bash
      cd frontend && npm run build 2>&1 | tail -10
      ```
      0 错误。

      ## 交付
      - 4 个 .vue 重写完
      - 路由 `/admin/user /admin/role /admin/dept /admin/dict` 已存在，确认
      - deliverable.md
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      1. AdminUser.vue 表格列含角色/部门/状态/最后登录
      2. AdminRole.vue 左侧角色列表 + 右侧权限树（el-tree）
      3. AdminDept.vue 左侧组织架构树 + 右侧成员表
      4. AdminDict.vue 左侧字典分类 + 右侧字典项表
      5. `npm run build` 0 错误
      6. 路由 4 条全存在
      7. 4 个页面用 el-table + el-tree + el-tag 等 Element Plus 组件
      FAIL 精确指出。
